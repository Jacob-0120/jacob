<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jacob</title>
    <style>
        /* 全域樣式，設定文字樣式和一點間距 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        /* 網頁大標題樣式 */
        h1 {
            color: #1a73e8; /* 淺藍色 */
            margin-bottom: 30px;
        }

        /* --- 表格的樣式設定 --- */
        table {
            border-collapse: collapse; /* 讓表格的雙線邊框合併成單線 */
            width: 300px;
            text-align: left;
        }

        /* 表頭和表格單元格的樣式 */
        th, td {
            border: 1px solid #ddd; /* 淺灰色邊框 */
            padding: 10px;
        }

        /* 表頭設定深色背景和白色文字 */
        th {
            background-color: #616161; /* 深灰色 */
            color: white;
            font-weight: bold;
        }

        /* 使用 :nth-child(even) 來選取 tbody 裡的偶數列 (第2、4行) */
        /* 因為表格資料列是從 td 開始數，nth-child 會把 td 當成第 1, 2, 3 個。 */
        /* 我們要表格的第 1, 3 列有顏色，也就是對應 nth-child(1) 和 nth-child(3)。*/
        /* 所以我們用 nth-child(odd) (奇數列) */
        tbody tr:nth-child(odd) {
            background-color: #ffff00; /* 黃色背景 */
        }

        /* --- 右上角浮動區塊的樣式設定 --- */
        .fixed-box {
            position: fixed;         /* 關鍵：設定為固定定位 */
            top: 20px;               /* 距離視窗頂部 20px */
            right: 20px;             /* 距離視窗右側 20px */
            border: 3px solid #6b9e23; /* 設定綠色粗邊框 */
            padding: 15px;
            width: 150px;
            background-color: white; /* 確保背景是白色，才不會透明疊到其他東西 */
            z-index: 1000;           /* 確保它在最上層，不會被表格擋住 */
        }
    </style>
</head>
<body>

    <h1>jacob</h1>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
